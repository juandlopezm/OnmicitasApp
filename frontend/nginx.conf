server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte para React Router (BrowserRouter)
    # Redirige todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos generados por Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deshabilitar cache para index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
