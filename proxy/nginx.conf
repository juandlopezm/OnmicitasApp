# ============================================================================
# OmniCitas — Nginx (proxy/)
#
# Security patterns:
#   • Scenario 1 — Canal Seguro: TLS/SSL termination at this layer.
#   • Scenario 2 — Reverse Proxy: Nginx is the single external entry point.
#       Clients never reach the API Gateway or microservices directly.
#   • Scenario 3 — Network Segmentation: enforced by Docker networks.
#       public_net: only this container.
#       gateway_net: nginx ↔ api-gateway ↔ frontend.
#       services_net (internal): microservices + databases.
# ============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream api_gateway {
        server kong:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── HTTP → HTTPS redirect (Scenario 1: Canal Seguro) ─────────────────────
    server {
        listen 80;
        server_name localhost; # Adjust as needed

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (Scenario 1 + Scenario 2) ────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost; # Adjust as needed

        # TLS — Scenario 1: Canal Seguro
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── API routes → API Gateway (Scenario 2: Proxy Inverso) ───────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # GraphQL → API Gateway
        location /graphql {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # Gateway docs
        location /docs      { proxy_pass http://api_gateway; proxy_set_header Host $host; }
        location /redoc     { proxy_pass http://api_gateway; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://api_gateway; proxy_set_header Host $host; }

        # Frontend (React SPA) — everything else
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
