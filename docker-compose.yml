version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: omnicitas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnicitas_db
      POSTGRES_USER: omnicitas_user
      POSTGRES_PASSWORD: omnicitas_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicitas_user -d omnicitas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Flask ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnicitas_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-cambia_esta_clave_en_produccion}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cambia_este_jwt_en_produccion}
      DATABASE_URL: postgresql://omnicitas_user:omnicitas_pass@db:5432/omnicitas_db
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app          # solo para desarrollo; quitar en producción
    command: >
      sh -c "python seed.py && gunicorn --bind 0.0.0.0:5000 --workers 1 --threads 4 --timeout 120 --worker-class gthread app.app:app"

  # ── Frontend React/Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: omnicitas_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── pgAdmin (opcional) ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: omnicitas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@omnicitas.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools   # solo se levanta con: docker compose --profile tools up

volumes:
  postgres_data:
